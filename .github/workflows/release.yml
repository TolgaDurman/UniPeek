name: Release

# Triggers when you push a tag like v1.2 or v2.0.1
# To release: git tag v1.2 && git push origin v1.2
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build .unitypackage
        run: |
          PACKAGE_NAME="UniPeek${GITHUB_REF_NAME}.unitypackage"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          python3 .github/scripts/build_package.py . "${PACKAGE_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ env.PACKAGE_NAME }}
          generate_release_notes: true
