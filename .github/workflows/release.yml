name: Release

# Triggers when you push a tag like v1.2 or v2.0.1
# To release: git tag v1.2 && git push origin v1.2
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage plugin under Unity project structure
        run: |
          mkdir -p _project/Assets/Plugins/UniPeek

          # The action needs Assets/Plugins/UniPeek.meta (the folder's own meta,
          # which lives outside the plugin repo in the Unity project).
          # We recreate it here using the real GUID from Assets/Plugins/UniPeek.meta.
          cat > _project/Assets/Plugins/UniPeek.meta << 'EOF'
          fileFormatVersion: 2
          guid: 1706633df7f3cea4e9c2cf8904dd9fd6
          folderAsset: yes
          DefaultImporter:
            externalObjects: {}
            userData:
            assetBundleName:
            assetBundleVariantName:
          EOF

          # Copy plugin files, excluding git and CI metadata
          rsync -a --exclude='.git' --exclude='.github' --exclude='_project' . _project/Assets/Plugins/UniPeek/

          # Build meta list: root folder meta first, then all metas inside the folder.
          # Paths must be relative to project-folder (_project/).
          echo "Assets/Plugins/UniPeek.meta" > metaList
          find _project/Assets/Plugins/UniPeek -name "*.meta" \
            | sed 's|^_project/||' \
            | sort >> metaList

          echo "=== Generated meta list ==="
          cat metaList

      - name: Create .unitypackage
        uses: pCYSl5EDgo/create-unitypackage@master
        with:
          project-folder: _project
          package-path: UniPeek${{ github.ref_name }}.unitypackage
          include-files: metaList

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: UniPeek${{ github.ref_name }}.unitypackage
          generate_release_notes: true
