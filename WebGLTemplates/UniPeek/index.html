<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>%%PRODUCT_NAME%%</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #unity-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #ccc;
      font: 14px/1.4 sans-serif;
      gap: 16px;
    }
    #unity-progress-bar-empty {
      width: 200px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    #unity-progress-bar-full {
      height: 100%;
      width: 0;
      background: #4caf50;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <div id="unity-loading">
    <div>%%PRODUCT_NAME%%</div>
    <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
  </div>
  <script>
    var canvas       = document.getElementById("unity-canvas");
    var loading      = document.getElementById("unity-loading");
    var progressFull = document.getElementById("unity-progress-bar-full");

    var config = {
      dataUrl:            "%%DATA_URL%%",
      frameworkUrl:       "%%FRAMEWORK_URL%%",
      codeUrl:            "%%CODE_URL%%",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "%%COMPANY_NAME%%",
      productName:        "%%PRODUCT_NAME%%",
      productVersion:     "%%PRODUCT_VERSION%%",
    };

    var script    = document.createElement("script");
    script.src    = "%%LOADER_URL%%";
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        progressFull.style.width = (100 * progress) + "%";
      }).then(function () {
        loading.style.display = "none";
      }).catch(function (msg) {
        alert(msg);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
